<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustam0217 | Official Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Instagram uslubidagi jonli gradient fon */
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .card {
            /* Shisha effekti (Glassmorphism) */
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px 20px;
            border-radius: 25px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            background: white;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: white;
            font-size: 22px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            background: white;
            color: #d6249f;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-pic">
            <img src="https://www.instagram.com/static/images/ico/favicon-192.png/ed84a5448702.png" alt="Profile">
        </div>
        
        <h1>@Rustam0217</h1>
        <p>Digital Creator | Music & Art</p>

        <a href="https://iplogger.com/RNCZM7" class="btn">Instagramni ochish</a>

        <div class="footer">
            © 2026 Rustam0217. Barcha huquqlar himoyalangan.
        </div>
    </div>

</body>
</html>
