<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustam0217</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
            background-attachment: fixed;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px 20px; border-radius: 35px;
            width: 95%; max-width: 360px; text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        .profile-pic {
            width: 130px; height: 130px; border-radius: 50%;
            margin: 0 auto 25px; padding: 4px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); overflow: hidden;
        }
        .profile-pic img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 3px solid white;
        }
        h1 {
            color: white; font-size: 32px; font-weight: 800;
            margin-bottom: 35px; text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .btn {
            display: block; background: white; color: #d6249f;
            text-decoration: none; padding: 18px; border-radius: 18px;
            font-weight: 700; font-size: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="profile-pic">
            <img src="IMG_8796.png" alt="Avatar">
        </div>
        <h1>Zapalin shu yerda</h1>
        <a href="https://iplogger.com/RNCZM7" class="btn">Profilni ko'rish</a>
    </div>
</body>
</html>
